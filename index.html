<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Intranet Primaria</title>

<style>
body{font-family:Arial;background:#eef2f7;margin:0}
header{background:#2d89ef;color:white;padding:15px;text-align:center}
.container{padding:15px}

.card{
background:white;
padding:15px;
margin:10px 0;
border-radius:10px;
}

input,textarea,button{
width:100%;
padding:10px;
margin:5px 0;
}

.hidden{display:none}
</style>
</head>

<body>

<header>📚 Intranet Primaria</header>

<div class="container">

<!-- LOGIN PADRE -->
<div id="loginPadre" class="card">
<h3>Padres</h3>
<input id="dni" placeholder="DNI">
<input id="password" type="password" placeholder="Contraseña">
<button onclick="loginPadre()">Ingresar</button>
</div>

<div id="panelPadre" class="hidden">
<h3 id="nombre"></h3>
<button onclick="logout()">Salir</button>
<div id="lista"></div>
</div>

<!-- DOCENTE -->
<div class="card">
<h3>Docente</h3>
<input id="userDoc" placeholder="Usuario">
<input id="passDoc" type="password" placeholder="Contraseña">
<button onclick="loginDoc()">Ingresar</button>

<div id="admin" class="hidden">
<input id="titulo" placeholder="Título">
<textarea id="mensaje"></textarea>
<input id="archivo" placeholder="Link archivo">
<button onclick="publicar()">Publicar</button>
<button onclick="verRespuestas()">Ver respuestas</button>
<div id="respuestas"></div>
</div>
</div>

</div>

<script>
const API="https://script.google.com/macros/s/AKfycbyit2_SosKuCPn0mH5WC6IIjMMI9qgHT4HD1YDiDq9qoNSyNf9zktVgXwHDkTzP5kck8A/exec";

// LOGIN PADRE
function loginPadre(){
fetch(API+`?action=loginPadre&dni=${dni.value}&password=${password.value}`)
.then(r=>r.json())
.then(d=>{
if(d.error){alert("Error");return;}

localStorage.setItem("user",JSON.stringify(d));
nombre.innerHTML="Bienvenido "+d.nombre;

loginPadreDiv.style.display="none";
panelPadre.classList.remove("hidden");

cargar(d.grado,d.seccion,d.dni);
});
}

// CARGAR
function cargar(g,s,dni){
fetch(API+"?action=comunicados")
.then(r=>r.json())
.then(data=>{
lista.innerHTML="";
data.filter(c=>c.grado==g && c.seccion==s)
.forEach(c=>{
lista.innerHTML+=`
<div class="card">
<h4>${c.titulo}</h4>
<p>${c.mensaje}</p>
<textarea id="r${c.id}"></textarea>
<button onclick="resp(${c.id},'${dni}')">Enviar</button>
</div>`;
});
});
}

// RESPONDER
function resp(id,dni){
fetch(API,{
method:"POST",
body:JSON.stringify({
action:"guardarRespuesta",
idComunicado:id,
dni:dni,
respuesta:document.getElementById("r"+id).value
})
}).then(()=>alert("Enviado"));
}

// DOCENTE
function loginDoc(){
fetch(API+`?action=loginDocente&user=${userDoc.value}&pass=${passDoc.value}`)
.then(r=>r.json())
.then(d=>{
if(d.error){alert("Error");return;}
window.doc=d;
admin.classList.remove("hidden");
});
}

function publicar(){
fetch(API,{
method:"POST",
body:JSON.stringify({
action:"guardarComunicado",
titulo:titulo.value,
mensaje:mensaje.value,
grado:doc.grado,
seccion:doc.seccion,
archivo:archivo.value
})
}).then(()=>alert("Publicado"));
}

function verRespuestas(){
fetch(API+"?action=respuestas")
.then(r=>r.json())
.then(data=>{
respuestas.innerHTML="";
data.forEach(r=>{
respuestas.innerHTML+=`<div class="card">${r[2]}: ${r[3]}</div>`;
});
});
}

function logout(){
localStorage.removeItem("user");
location.reload();
}
</script>

</body>
</html>
