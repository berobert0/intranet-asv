<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Intranet Escolar PRO</title>

<style>
body{font-family:Arial;background:#eef2f7;margin:0}
header{background:#2d89ef;color:white;padding:15px;text-align:center}
.container{padding:15px}

.card{
  background:white;
  padding:15px;
  margin:10px 0;
  border-radius:10px;
  box-shadow:0 2px 6px rgba(0,0,0,0.1)
}

input,textarea,select,button{
  width:100%;
  padding:10px;
  margin:5px 0;
  border-radius:6px;
}

button{
  background:#2d89ef;
  color:white;
  border:none;
}

.hidden{display:none}
</style>
</head>

<body>

<header>📚 Intranet Escolar PRO</header>

<div class="container">

<!-- LOGIN PADRES -->
<div id="loginPadre" class="card">
<h3>Ingreso Padres</h3>
<input id="dni" placeholder="DNI">
<button onclick="login()">Ingresar</button>
</div>

<!-- PANEL PADRE -->
<div id="panelPadre" class="hidden">
<h3 id="nombre"></h3>
<div id="lista"></div>
</div>

<!-- DOCENTE -->
<div class="card">
<h3>Panel Docente</h3>
<input type="password" id="clave" placeholder="Clave">
<button onclick="loginDoc()">Ingresar</button>

<div id="admin" class="hidden">

<input id="titulo" placeholder="Título">
<textarea id="mensaje" placeholder="Mensaje"></textarea>
<input id="archivo" placeholder="Link PDF o imagen">
<select id="grado">
<option>Primaria</option>
<option>Secundaria</option>
</select>

<button onclick="publicar()">Publicar</button>

<button onclick="verRespuestas()">Ver Respuestas</button>

<div id="respuestas"></div>

</div>
</div>

</div>

<script>
const API="https://script.google.com/macros/s/AKfycbyNn2Wn7XtbWeHX-fZqYIs6Peoy2KsKb33LBGQsNrXQhxgeUdv6547vGNnCadUQcvwN5w/exec";

// LOGIN PADRE
function login(){
  fetch(API+"?action=loginPadre&dni="+dni.value)
  .then(r=>r.json())
  .then(data=>{
    if(data.error){
      alert("No registrado");
      return;
    }

    nombre.innerHTML="Bienvenido "+data.nombre;
    loginPadre.classList.add("hidden");
    panelPadre.classList.remove("hidden");

    cargar(data.grado, data.dni);
  });
}

// CARGAR COMUNICADOS
function cargar(gradoUser,dniUser){
  fetch(API+"?action=comunicados")
  .then(r=>r.json())
  .then(data=>{

    lista.innerHTML="";

    data.filter(c=>c.grado==gradoUser)
    .forEach(c=>{

      lista.innerHTML+=`
      <div class="card">
      <h4>${c.titulo}</h4>
      <p>${c.mensaje}</p>

      ${c.archivo ? `<a href="${c.archivo}" target="_blank">📎 Ver archivo</a>`:""}

      <textarea id="r${c.id}" placeholder="Responder"></textarea>
      <button onclick="responder(${c.id},'${dniUser}')">Enviar</button>
      </div>`;
    });

  });
}

// RESPONDER
function responder(id,dni){
  const texto=document.getElementById("r"+id).value;

  fetch(API,{
    method:"POST",
    body:JSON.stringify({
      action:"guardarRespuesta",
      idComunicado:id,
      dni:dni,
      respuesta:texto
    })
  }).then(()=>alert("Enviado"));
}

// DOCENTE LOGIN
function loginDoc(){
  if(clave.value==="1234"){
    admin.classList.remove("hidden");
  }
}

// PUBLICAR
function publicar(){
  fetch(API,{
    method:"POST",
    body:JSON.stringify({
      action:"guardarComunicado",
      titulo:titulo.value,
      mensaje:mensaje.value,
      grado:grado.value,
      archivo:archivo.value
    })
  }).then(()=>alert("Publicado"));
}

// VER RESPUESTAS
function verRespuestas(){
  fetch(API+"?action=respuestas")
  .then(r=>r.json())
  .then(data=>{
    respuestas.innerHTML="<h4>Respuestas:</h4>";
    data.forEach(r=>{
      respuestas.innerHTML+=`
      <div class="card">
      DNI: ${r[2]}<br>
      ${r[3]}
      </div>`;
    });
  });
}
</script>

</body>
</html>
