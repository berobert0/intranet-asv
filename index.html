<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Intranet Escolar</title>

<style>
body{font-family:Arial;background:#f2f4f7;margin:0;padding:20px}
h2{text-align:center}

.card{
  background:#fff;
  padding:15px;
  margin:10px 0;
  border-radius:10px;
  box-shadow:0 2px 5px rgba(0,0,0,0.1)
}

input,textarea,button{
  width:100%;
  margin:5px 0;
  padding:10px;
  border-radius:5px;
  border:1px solid #ccc
}

button{
  background:#2d89ef;
  color:white;
  border:none;
}

#admin,#padre{display:none}
</style>
</head>

<body>

<h2>📚 Intranet Escolar</h2>

<button onclick="mostrar('admin')">Docente</button>
<button onclick="mostrar('padre')">Padre</button>

<!-- ADMIN -->
<div id="admin">
<h3>Panel Docente</h3>

<input id="clave" type="password" placeholder="Contraseña">
<button onclick="login()">Ingresar</button>

<div id="panelAdmin" style="display:none">
<h4>Nuevo Comunicado</h4>

<input id="titulo" placeholder="Título">
<textarea id="mensaje" placeholder="Mensaje"></textarea>
<input id="grado" placeholder="Grado">

<button onclick="guardarComunicado()">Publicar</button>
</div>
</div>

<!-- PADRE -->
<div id="padre">
<h3>Padres</h3>

<input id="dni" placeholder="Ingrese DNI">
<button onclick="cargar()">Ver Comunicados</button>

<div id="lista"></div>
</div>

<script>
const API = "https://script.google.com/macros/s/AKfycbyaQNJOxGB5unVzZ95P30PGVK5gkG_XIcDM1iScDuqCeFrBsr9HRi0V9qH9_xkVGF0wqA/exec";

function mostrar(tipo){
  document.getElementById("admin").style.display="none";
  document.getElementById("padre").style.display="none";
  document.getElementById(tipo).style.display="block";
}

function login(){
  if(document.getElementById("clave").value==="1234"){
    document.getElementById("panelAdmin").style.display="block";
  }else{
    alert("Clave incorrecta");
  }
}

function guardarComunicado(){
  const data = {
    action:"guardarComunicado",
    titulo:titulo.value,
    mensaje:mensaje.value,
    grado:grado.value
  };

  fetch(API,{
    method:"POST",
    body:JSON.stringify(data)
  }).then(()=>alert("Publicado"));
}

function cargar(){
  fetch(API)
  .then(r=>r.json())
  .then(data=>{
    lista.innerHTML="";
    data.forEach(c=>{
      lista.innerHTML+=`
      <div class="card">
        <b>${c.titulo}</b><br>
        ${c.mensaje}<br>
        <textarea id="r${c.id}" placeholder="Responder"></textarea>
        <button onclick="responder(${c.id})">Enviar</button>
      </div>`;
    });
  });
}

function responder(id){
  const dni = document.getElementById("dni").value;
  const texto = document.getElementById("r"+id).value;

  fetch(API,{
    method:"POST",
    body:JSON.stringify({
      action:"guardarRespuesta",
      idComunicado:id,
      dni:dni,
      respuesta:texto
    })
  }).then(()=>alert("Respuesta enviada"));
}
</script>

</body>
</html>
